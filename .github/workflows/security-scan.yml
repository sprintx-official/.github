name: Security Scanner

on:
  pull_request:
  push:

permissions:
  contents: read
  pull-requests: write

jobs:
  malware-scan:
    name: Malware & Supply Chain Scan
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Check: Committed secret files"
        id: secrets_files
        shell: bash
        run: |
          echo "### Committed Secrets Files" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          ENV_FILES=$(find . -maxdepth 5 -not -path "*/.git/*" -not -path "*/node_modules/*" -not -path "*/.next/*" -not -path "*/dist/*" -not -path "*/build/*" \
            \( -name ".env" -o -name ".env.local" -o -name ".env.production" -o -name ".env.staging" \
            -o -name ".env.development" -o -name ".env.prod" -o -name ".env.dev" \
            -o -name ".env.production.local" -o -name ".env.development.local" -o -name ".env.test.local" \) 2>/dev/null || true)

          for file in $ENV_FILES; do
            echo "$file" | grep -qiE '\.(example|sample|template)$' && continue
            echo "::error file=$file::COMMITTED SECRET: $file should not be in the repository"
            echo "- BLOCKED: \`$file\` committed — likely contains secrets" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          done

          SECRET_FILES=$(find . -maxdepth 5 -not -path "*/.git/*" -not -path "*/node_modules/*" \
            \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \
            -o -name "*.jks" -o -name "id_rsa" -o -name "id_ed25519" -o -name ".htpasswd" \
            -o -name "credentials.json" -o -name "service-account*.json" \
            -o -name "firebase-adminsdk*.json" \) 2>/dev/null || true)

          for file in $SECRET_FILES; do
            echo "::error file=$file::COMMITTED SECRET: $file likely contains credentials"
            echo "- BLOCKED: \`$file\` likely contains credentials" >> $GITHUB_STEP_SUMMARY
            FAILED=1
          done

          [ $FAILED -eq 0 ] && echo "- No committed secret files found" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: Config file malware"
        id: config_malware
        shell: bash
        run: |
          echo "### Config File Malware Scan" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          CONFIG_FILES=$(find . -maxdepth 4 \
            \( -name "postcss.config.*" -o -name "*.config.js" -o -name "*.config.mjs" \
            -o -name "*.config.cjs" -o -name "*.config.ts" -o -name "webpack.config.*" \
            -o -name "vite.config.*" -o -name "rollup.config.*" -o -name "next.config.*" \
            -o -name "nuxt.config.*" -o -name "tailwind.config.*" \) \
            -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null || true)

          for file in $CONFIG_FILES; do
            if grep -qE '_\$_[a-zA-Z0-9]{4}|_\$[a-z]{2}[0-9]+|global\[.!\.\]|sfL\(|joW\(|dgC\(' "$file" 2>/dev/null; then
              echo "::error file=$file::MALWARE DETECTED"; FAILED=1
              echo "- BLOCKED: \`$file\` contains known malware" >> $GITHUB_STEP_SUMMARY
            fi
            if awk 'length > 300 && /[^ ]/ && / {50,}/' "$file" 2>/dev/null | grep -q .; then
              echo "::error file=$file::Whitespace padding malware"; FAILED=1
              echo "- BLOCKED: \`$file\` has suspicious whitespace padding" >> $GITHUB_STEP_SUMMARY
            fi
            if grep -qE 'eval\s*\(|new\s+Function\s*\(|Function\s*\(' "$file" 2>/dev/null; then
              echo "::error file=$file::eval/Function in config"; FAILED=1
              echo "- BLOCKED: \`$file\` uses eval()/Function()" >> $GITHUB_STEP_SUMMARY
            fi
            if grep -qE "require\s*\(\s*['\"]https?['\"]|require\s*\(\s*['\"]child_process['\"]|require\s*\(\s*['\"]net['\"]" "$file" 2>/dev/null; then
              echo "::error file=$file::Network/process imports in config"; FAILED=1
              echo "- BLOCKED: \`$file\` imports network/process modules" >> $GITHUB_STEP_SUMMARY
            fi
            if grep -qE '0x[a-fA-F0-9]{40,}|T[A-Za-z1-9]{33}' "$file" 2>/dev/null; then
              echo "::error file=$file::Blockchain address in config"; FAILED=1
              echo "- BLOCKED: \`$file\` contains blockchain addresses" >> $GITHUB_STEP_SUMMARY
            fi
          done

          [ $FAILED -eq 0 ] && echo "- All config files clean" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: .gitignore guard"
        id: gitignore
        shell: bash
        run: |
          echo "### .gitignore Guard" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- .gitignore 2>/dev/null || true)
            if echo "$DIFF" | grep -qE '^\-.*\.env'; then
              echo "::error file=.gitignore::.env entries removed"; FAILED=1
              echo "- BLOCKED: PR removes \`.env*\` from \`.gitignore\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- .gitignore intact" >> $GITHUB_STEP_SUMMARY
            fi
          else
            if [ -f .gitignore ] && ! grep -qE '^\s*\.env' .gitignore 2>/dev/null; then
              echo "::warning file=.gitignore::Missing .env entries"
              echo "- WARNING: \`.gitignore\` missing \`.env\` entries" >> $GITHUB_STEP_SUMMARY
            else
              echo "- .gitignore OK" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: Secret leaks in diff"
        id: secret_leaks
        shell: bash
        run: |
          echo "### Secret Leak Detection" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/${{ github.base_ref }}...HEAD 2>/dev/null || true)
          else
            DIFF=$(git diff HEAD~1...HEAD 2>/dev/null || true)
          fi

          check_secret() {
            local pattern="$1" label="$2" block="$3"
            if echo "$DIFF" | grep -qE "$pattern"; then
              if [ "$block" = "1" ]; then
                echo "::error::SECRET: $label"; FAILED=1
                echo "- BLOCKED: $label found" >> $GITHUB_STEP_SUMMARY
              else
                echo "::warning::$label"
                echo "- WARNING: $label" >> $GITHUB_STEP_SUMMARY
              fi
              return 0
            fi
            return 0
          }

          check_secret '^\+.*AKIA[0-9A-Z]{16}' "AWS Access Key ID" 1
          check_secret '^\+.*sk-[A-Za-z0-9]{20,}' "OpenAI API key" 1
          check_secret '^\+.*sk-ant-[A-Za-z0-9-]{20,}' "Anthropic API key" 1
          check_secret '^\+.*AIza[0-9A-Za-z_-]{35}' "Google API key" 1
          check_secret '^\+.*(sk_live_|rk_live_|sk_test_)[A-Za-z0-9]{20,}' "Stripe key" 1
          check_secret '^\+.*SG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}' "SendGrid API key" 1
          check_secret '^\+.*xox[bporas]-[A-Za-z0-9-]{10,}' "Slack token" 1
          check_secret '^\+.*(ghp_|gho_|ghu_|ghs_|ghr_)[A-Za-z0-9]{36,}' "GitHub token" 1
          check_secret '^\+.*-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----' "Private key" 1
          check_secret '^\+.*(mongodb(\+srv)?|postgres(ql)?|mysql|redis|amqp)://[^ ]+:[^ ]+@' "Database connection string" 1
          check_secret '^\+.*"type"\s*:\s*"service_account"' "GCP service account" 1
          check_secret '^\+.*SK[a-f0-9]{32}' "Twilio API key" 1

          [ $FAILED -eq 0 ] && echo "- No secrets detected" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: NPM security"
        id: npm_security
        shell: bash
        run: |
          echo "### NPM Security" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          PKGS=$(find . -name "package.json" -not -path "*/node_modules/*" -maxdepth 4 2>/dev/null || true)
          for file in $PKGS; do
            if grep -qE '"(preinstall|postinstall|preuninstall)".*"(curl |wget |node -e|bash |sh |eval |nc )' "$file" 2>/dev/null; then
              echo "::error file=$file::Dangerous install script"; FAILED=1
              echo "- BLOCKED: \`$file\` has dangerous install scripts" >> $GITHUB_STEP_SUMMARY
            fi
          done

          [ $FAILED -eq 0 ] && echo "- No suspicious npm patterns" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      # =====================================================================
      # NEW: npm audit — catch known CVEs in dependencies
      # =====================================================================
      - name: "Check: NPM dependency vulnerabilities"
        id: npm_audit
        shell: bash
        run: |
          echo "### NPM Dependency Vulnerabilities" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          # Find lock files (npm audit needs package-lock.json or npm-shrinkwrap.json)
          LOCK_FILES=$(find . -maxdepth 3 -name "package-lock.json" -not -path "*/node_modules/*" 2>/dev/null || true)

          if [ -z "$LOCK_FILES" ]; then
            # Try yarn.lock with yarn audit
            YARN_LOCKS=$(find . -maxdepth 3 -name "yarn.lock" -not -path "*/node_modules/*" 2>/dev/null || true)
            if [ -z "$YARN_LOCKS" ]; then
              echo "- No lock files found, skipping audit" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          for lockfile in $LOCK_FILES; do
            DIR=$(dirname "$lockfile")
            echo "Auditing $DIR..."

            # Run npm audit, only fail on high/critical
            AUDIT_OUTPUT=$(cd "$DIR" && npm audit --audit-level=high --json 2>/dev/null || true)

            HIGH_COUNT=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
            CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")

            if [ "$CRITICAL_COUNT" -gt 0 ] 2>/dev/null; then
              echo "::error file=$lockfile::$CRITICAL_COUNT critical vulnerabilities found"
              echo "- BLOCKED: \`$DIR\` has **$CRITICAL_COUNT critical** vulnerabilities" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi

            if [ "$HIGH_COUNT" -gt 0 ] 2>/dev/null; then
              echo "::warning file=$lockfile::$HIGH_COUNT high vulnerabilities found"
              echo "- WARNING: \`$DIR\` has **$HIGH_COUNT high** vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi

            if [ "$CRITICAL_COUNT" -eq 0 ] 2>/dev/null && [ "$HIGH_COUNT" -eq 0 ] 2>/dev/null; then
              echo "- \`$DIR\` — no high/critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: Code security patterns (SAST)"
        id: sast
        shell: bash
        run: |
          echo "### Code Security (SAST)" >> $GITHUB_STEP_SUMMARY
          FAILED=0; WARNS=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ALL_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null | grep -v node_modules || true)
          else
            ALL_FILES=$(git diff --name-only HEAD~1...HEAD 2>/dev/null | grep -v node_modules || true)
          fi

          # JavaScript/TypeScript files
          JS_FILES=$(echo "$ALL_FILES" | grep -E '\.(js|jsx|ts|tsx|mjs|cjs)$' || true)

          # Python files
          PY_FILES=$(echo "$ALL_FILES" | grep -E '\.py$' || true)

          # ---- JavaScript/TypeScript SAST ----
          for file in $JS_FILES; do
            [ -f "$file" ] || continue

            if grep -qE 'rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED.*0' "$file" 2>/dev/null; then
              echo "::error file=$file::TLS verification disabled"; FAILED=1
              echo "- BLOCKED: \`$file\` disables TLS verification" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -qiE 'coinhive|cryptonight|stratum\+tcp|minergate|cryptoloot' "$file" 2>/dev/null; then
              echo "::error file=$file::Crypto mining code"; FAILED=1
              echo "- BLOCKED: \`$file\` contains crypto mining code" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE "(exec|execSync|spawn)\s*\(\s*['\"\`].*\\$\{" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Potential command injection"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` possible command injection" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE "(query|execute|raw)\s*\(\s*['\"\`].*\\$\{" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Potential SQL injection"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` possible SQL injection" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -qE "createHash\s*\(\s*['\"]md5['\"]" "$file" 2>/dev/null; then
              echo "::warning file=$file::Weak hash (MD5)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses MD5" >> $GITHUB_STEP_SUMMARY
            fi

            # ---- XSS Detection (React/JS) ----
            if grep -nE 'dangerouslySetInnerHTML' "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::dangerouslySetInnerHTML usage — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses \`dangerouslySetInnerHTML\` — verify input is sanitized" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE '\.innerHTML\s*=' "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::innerHTML assignment — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` sets \`.innerHTML\` directly — use textContent or sanitize" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE '\$\(.*\)\.html\s*\(' "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::jQuery .html() — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses jQuery \`.html()\` — verify input is sanitized" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE "document\.(write|writeln)\s*\(" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::error file=$file::document.write — XSS risk"; FAILED=1
              echo "- BLOCKED: \`$file\` uses \`document.write()\` — high XSS risk" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE "\.outerHTML\s*=" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::outerHTML assignment — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` sets \`.outerHTML\` directly — verify input is sanitized" >> $GITHUB_STEP_SUMMARY
            fi

            if grep -nE "insertAdjacentHTML\s*\(" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::insertAdjacentHTML — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses \`insertAdjacentHTML\` — verify input is sanitized" >> $GITHUB_STEP_SUMMARY
            fi

            # Unescaped template literals in response (server-side XSS)
            if grep -nE "res\.(send|write)\s*\(\s*\`" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Template literal in HTTP response — potential XSS"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` sends template literal in response — use proper templating" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # ---- Python SAST ----
          for file in $PY_FILES; do
            [ -f "$file" ] || continue

            # Command injection
            if grep -nE "(os\.system|os\.popen|subprocess\.(call|run|Popen))\s*\(.*f['\"]" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Potential command injection (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` possible command injection — use parameterized subprocess" >> $GITHUB_STEP_SUMMARY
            fi

            # Shell=True in subprocess
            if grep -nE "subprocess\.(call|run|Popen)\s*\(.*shell\s*=\s*True" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::subprocess with shell=True (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses \`shell=True\` — vulnerable to injection" >> $GITHUB_STEP_SUMMARY
            fi

            # SQL injection (raw queries with f-strings)
            if grep -nE "(execute|executemany|raw)\s*\(.*f['\"]" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Potential SQL injection (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` possible SQL injection — use parameterized queries" >> $GITHUB_STEP_SUMMARY
            fi

            # eval/exec
            if grep -nE "^\s*(eval|exec)\s*\(" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::error file=$file::eval()/exec() usage (Python)"; FAILED=1
              echo "- BLOCKED: \`$file\` uses \`eval()\`/\`exec()\` — code execution risk" >> $GITHUB_STEP_SUMMARY
            fi

            # pickle.loads (deserialization attack)
            if grep -nE "pickle\.(loads|load)\s*\(" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::pickle deserialization (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses \`pickle.load()\` — deserialization attack risk" >> $GITHUB_STEP_SUMMARY
            fi

            # Weak hashing
            if grep -nE "hashlib\.(md5|sha1)\s*\(" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Weak hash algorithm (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` uses weak hash (MD5/SHA1) — use SHA-256+" >> $GITHUB_STEP_SUMMARY
            fi

            # Disabled SSL verification
            if grep -nE "verify\s*=\s*False" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::error file=$file::SSL verification disabled (Python)"; FAILED=1
              echo "- BLOCKED: \`$file\` disables SSL verification" >> $GITHUB_STEP_SUMMARY
            fi

            # Django/Flask debug mode in production
            if grep -nE "DEBUG\s*=\s*True" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::DEBUG=True (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` has \`DEBUG=True\` — ensure this is not production" >> $GITHUB_STEP_SUMMARY
            fi

            # Hardcoded secrets in Python
            if grep -nE "(password|secret|api_key|token)\s*=\s*['\"][^'\"]{8,}['\"]" "$file" 2>/dev/null | grep -viE '(example|placeholder|xxx|test|dummy|changeme|your_)' | head -1 | grep -q .; then
              echo "::warning file=$file::Possible hardcoded secret (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` may contain a hardcoded secret" >> $GITHUB_STEP_SUMMARY
            fi

            # SSRF via user-controlled URLs
            if grep -nE "requests\.(get|post|put|delete)\s*\(.*request\.(args|form|json)" "$file" 2>/dev/null | head -1 | grep -q .; then
              echo "::warning file=$file::Potential SSRF (Python)"; WARNS=$((WARNS+1))
              echo "- WARNING: \`$file\` passes user input to HTTP request — SSRF risk" >> $GITHUB_STEP_SUMMARY
            fi
          done

          [ $FAILED -eq 0 ] && [ $WARNS -eq 0 ] && echo "- No code security issues" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: Docker & infra security"
        id: infra
        shell: bash
        run: |
          echo "### Infrastructure Security" >> $GITHUB_STEP_SUMMARY
          FAILED=0

          DFILES=$(find . -maxdepth 3 \( -name "Dockerfile*" -o -name "docker-compose*.yml" -o -name "docker-compose*.yaml" \) -not -path "*/node_modules/*" 2>/dev/null || true)
          for file in $DFILES; do
            if grep -qE 'privileged:\s*true' "$file" 2>/dev/null; then
              echo "::error file=$file::Privileged container"; FAILED=1
              echo "- BLOCKED: \`$file\` uses privileged mode" >> $GITHUB_STEP_SUMMARY
            fi
            if grep -qEi '(ENV|ARG).*(PASSWORD|SECRET|API_KEY|TOKEN)\s*=' "$file" 2>/dev/null; then
              echo "::warning file=$file::Secrets in Dockerfile"
              echo "- WARNING: \`$file\` has secrets in ENV/ARG" >> $GITHUB_STEP_SUMMARY
            fi
          done

          WFILES=$(find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null || true)
          for file in $WFILES; do
            if grep -qE 'pull_request_target' "$file" 2>/dev/null && grep -qE 'actions/checkout' "$file" 2>/dev/null; then
              echo "::warning file=$file::pull_request_target with checkout"
              echo "- WARNING: \`$file\` uses pull_request_target + checkout" >> $GITHUB_STEP_SUMMARY
            fi
          done

          [ $FAILED -eq 0 ] && echo "- No infrastructure issues" >> $GITHUB_STEP_SUMMARY
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: "Check: Suspicious files"
        id: suspicious
        shell: bash
        run: |
          echo "### Suspicious Files" >> $GITHUB_STEP_SUMMARY
          FOUND=0

          BINS=$(find . -maxdepth 4 -not -path "*/.git/*" -not -path "*/node_modules/*" \
            -not -path "*/public/*" -not -path "*/assets/*" -not -path "*/static/*" \
            \( -name "*.exe" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) 2>/dev/null || true)

          for file in $BINS; do
            echo "::warning file=$file::Binary in source tree"; FOUND=1
            echo "- WARNING: \`$file\` binary should not be in source" >> $GITHUB_STEP_SUMMARY
          done

          [ $FOUND -eq 0 ] && echo "- No suspicious files" >> $GITHUB_STEP_SUMMARY

      - name: "Final result"
        if: always()
        shell: bash
        run: |
          echo "---" >> $GITHUB_STEP_SUMMARY
          TOTAL_FAILED=0

          [ "${{ steps.secrets_files.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.config_malware.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.gitignore.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.secret_leaks.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.npm_security.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.npm_audit.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.sast.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))
          [ "${{ steps.infra.outputs.failed }}" = "1" ] && TOTAL_FAILED=$((TOTAL_FAILED+1))

          if [ $TOTAL_FAILED -gt 0 ]; then
            echo "### SCAN FAILED — $TOTAL_FAILED check(s) have blocking issues" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### All checks passed" >> $GITHUB_STEP_SUMMARY
          fi
